# ─────────────────────────────────────────────────────────────────────────────
# Pipeline CI/CD GitHub Actions
# Déclenché à chaque push sur main ou pull request
# ─────────────────────────────────────────────────────────────────────────────

name: ML Pipeline CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── JOB 1 : TESTS ────────────────────────────────────────────────────────
  test:
    name: Tests & Qualité du code
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # Met en cache les dépendances pour accélérer

      # 3. Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Entraîner le modèle (nécessaire pour les tests API)
      - name: Train model
        run: |
          python data/create_data.py
          python src/train.py

      # 5. Lancer les tests
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  # ─── JOB 2 : BUILD DOCKER ────────────────────────────────────────────────
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test  # Ne tourne que si les tests passent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Re-entraîner le modèle pour l'inclure dans l'image
      - name: Set up Python and train model
        run: |
          pip install -r requirements.txt
          python data/create_data.py
          python src/train.py

      # Construire l'image Docker
      - name: Build Docker image
        run: |
          docker build -t review-classifier:${{ github.sha }} .
          docker build -t review-classifier:latest .

      # (En production, on pousserait l'image sur un registry)
      # - name: Push to Docker Hub (exemple)
      #   run: |
      #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      #     docker push review-classifier:latest

      # Vérifier que le container démarre correctement
      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 --name test-container review-classifier:latest
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
          echo "Container smoke test passed!"
